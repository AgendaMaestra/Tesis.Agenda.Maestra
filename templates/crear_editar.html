{% extends 'layout.html' %} 
{% block content %} 
<div class="main-wrapper"> 
     <div class="glass-card"> 
         <h2 style="font-size: 1.8rem; margin-bottom: 30px; color: var(--accent);"> 
             {{ 'EDITAR ELEMENTO' if tarea else 'NUEVO ELEMENTO' }} 
         </h2> 
                 
         <form method="POST" id="main-form"> 
             <label style="font-size:0.75rem; font-weight:800; opacity:0.5; text-transform:uppercase;">Tipo de actividad</label> 
             <select name="tipo" required> 
                 <option value="tarea" {{ 'selected' if tarea and tarea.tipo == 'tarea' else '' }}>Es una Tarea ordinaria</option> 
                 <option value="examen" {{ 'selected' if tarea and tarea.tipo == 'examen' else '' }}>Es un Examen evaluativo</option> 
             </select> 

             <label style="font-size:0.75rem; font-weight:800; opacity:0.5; text-transform:uppercase;">Nombre de la Materia</label> 
             <input type="text" name="materia" placeholder="Ej: Matematica" value="{{ tarea.materia if tarea else '' }}" required> 
                         
             <label style="font-size:0.75rem; font-weight:800; opacity:0.5; text-transform:uppercase;">Título o tema de estudio</label> 
             <input type="text" name="tema" placeholder="Ej: Capitulo 3" value="{{ tarea.tema if tarea else '' }}" required> 

             <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
                 <div>
                     <label style="font-size:0.75rem; font-weight:800; opacity:0.5; text-transform:uppercase;">Día de entrega</label> 
                     <input type="date" name="fecha" value="{{ tarea.fecha if tarea else '' }}" required> 
                 </div>
                 
                 <div>
                     <label style="font-size:0.75rem; font-weight:800; opacity:0.5; text-transform:uppercase;">Hora de entrega</label> 
                     
                     <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                         <select name="hora_h" style="margin-bottom:0;">
                             {% for h in range(0, 24) %}
                                 {% set hr = "%02d" % h %}
                                 <option value="{{ hr }}" {{ 'selected' if hora_actual == hr else '' }}>{{ hr }} Hs</option>
                             {% endfor %}
                         </select>
                         <select name="hora_m" style="margin-bottom:0;">
                             {% for m in range(0, 60, 5) %}
                                 {% set mn = "%02d" % m %}
                                 <option value="{{ mn }}" {{ 'selected' if minuto_actual == mn else '' }}>{{ mn }} min</option>
                             {% endfor %}
                         </select>
                     </div>
                 </div>
             </div>

             <!-- SECCIÓN DE TAREAS GRUPALES (Ahora dentro del Form) -->
             <div class="input-group" style="margin-bottom: 20px;">
                <label style="font-size:0.75rem; font-weight:800; opacity:0.5; text-transform:uppercase;">Modalidad de Trabajo</label>
                <select name="tipo_tarea" id="tipo_tarea" onchange="toggleGrupo()" 
                        style="width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 12px; color: white;">
                    <option value="individual">Individual</option>
                    <option value="grupal">Grupal (Colaborativa)</option>
                </select>
            </div>

            <div id="campo-colaboradores" style="display: none; margin-bottom: 20px;">
                <label style="font-size: 0.7rem; opacity: 0.5; text-transform:uppercase;">Correos de Compañeros (Separados por coma)</label>
                <input type="text" name="colaboradores" placeholder="ejemplo1@mail.com, ejemplo2@mail.com"
                       style="width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 12px; color: white;">
            </div>
                         
             <input type="checkbox" name="importante" id="imp-check" style="display:none;" {{ 'checked' if tarea and tarea.importante else '' }}> 
                         
             <div class="priority-box {{ 'active' if tarea and tarea.importante else '' }}" id="priority-trigger"> 
                 <div> 
                     <div style="font-weight: 800; font-size: 0.95rem;">Prioridad Máxima</div> 
                     <div style="font-size: 0.75rem; opacity: 0.6; margin-top: 3px;">Resaltar al principio del tablero principal</div> 
                 </div> 
                 <div class="priority-toggle"></div> 
             </div> 

             <button type="submit" class="btn-main" style="margin-top: 10px;">GUARDAR ELEMENTO</button> 
             <a href="{{ url_for('index') }}" style="display:block; text-align:center; margin-top:20px; color:var(--text-muted); text-decoration:none; font-size:0.85rem; font-weight: 700;">Cancelar y salir</a> 
         </form> 
     </div>
</div>

<script>
    // Función para mostrar/ocultar el campo de colaboradores
    function toggleGrupo() {
        const tipo = document.getElementById('tipo_tarea').value;
        const campo = document.getElementById('campo-colaboradores');
        campo.style.display = (tipo === 'grupal') ? 'block' : 'none';
    }

    // Lógica para el toggle de prioridad (asegúrate de tener esto para que el diseño funcione)
    document.getElementById('priority-trigger').addEventListener('click', function() {
        this.classList.toggle('active');
        const checkbox = document.getElementById('imp-check');
        checkbox.checked = !checkbox.checked;
    });

     const trigger = document.getElementById('priority-trigger'); 
     const checkbox = document.getElementById('imp-check'); 
     
     trigger.addEventListener('click', function() { 
         checkbox.checked = !checkbox.checked; 
         if(checkbox.checked) { 
             trigger.classList.add('active'); 
         } else { 
             trigger.classList.remove('active'); 
         } 
     }); 
</script> 

<style>
/* ============================================================
   MODO ESCRITORIO (Sin cambios de orden)
   ============================================================ */
@media screen and (min-width: 601px) {
    .glass-card {
        max-width: 600px !important;
        margin: 40px auto !important;
        padding: 40px !important;
        display: block !important;
    }

    /* Mantiene la Fecha y Hora en una sola fila de dos columnas */
    .grid-form-row {
        display: grid !important;
        grid-template-columns: 1fr 1fr !important;
        gap: 20px !important;
        margin-bottom: 25px !important;
    }

    /* Caja de Prioridad debajo de Fecha/Hora */
    .priority-box {
        display: flex !important;
        justify-content: space-between !important;
        align-items: center !important;
        padding: 20px !important;
        margin-bottom: 30px !important;
        background: rgba(255, 255, 255, 0.03) !important;
        border: 1px solid var(--glass-border) !important;
        border-radius: 12px !important;
    }

    /* Botón Guardar y Cancelar */
    .btn-main {
        width: 100% !important;
        padding: 16px !important;
    }
    
    a[href*="index"] {
        display: block !important;
        text-align: center !important;
        margin-top: 20px !important;
    }
}

/* ============================================================
   MODO MÓVIL (Organizado hacia abajo)
   ============================================================ */
@media screen and (max-width: 600px) {
    .main-wrapper {
        padding: 10px !important;
    }

    .glass-card {
        padding: 25px 15px !important;
        width: 100% !important;
    }

    /* Forzamos que Fecha y Hora se apilen verticalmente */
    .glass-card form div[style*="grid-template-columns: 1fr 1fr"] {
        grid-template-columns: 1fr !important; 
        gap: 15px !important;
    }

    /* Pero los selectores de Hora (HH y MM) se quedan juntos */
    div[style*="grid-template-columns: 1fr 1fr"] div[style*="display: grid"] {
        grid-template-columns: 1fr 1fr !important;
        gap: 10px !important;
    }

    /* Inputs más altos para el dedo y fuente de 16px para evitar zoom */
    input[type="text"], 
    input[type="date"], 
    select {
        width: 100% !important;
        height: 50px !important;
        font-size: 16px !important; 
        margin-bottom: 15px !important;
    }

    /* Prioridad: Ajustada para el ancho del celular */
    .priority-box {
        margin-top: 10px !important;
        margin-bottom: 25px !important;
        padding: 15px !important;
    }

    /* Botón de Guardar: Grande y centrado */
    .btn-main {
        width: 100% !important;
        padding: 18px !important;
        font-size: 1rem !important;
        border-radius: 12px !important;
    }

    /* Cancelar: Abajo de todo */
    a[href*="index"] {
        display: block !important;
        text-align: center !important;
        margin-top: 25px !important;
    }
}

</style>

{% endblock %}
