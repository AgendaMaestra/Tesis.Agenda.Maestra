{% extends 'layout.html' %} 
{% block content %} 
<div class="main-wrapper"> 
     <div class="glass-card" style="text-align: center; max-width: 500px;"> 
         <h2 style="font-weight:800; margin-bottom:10px; color: var(--accent); font-size:1.5rem;">Modificar Perfil</h2> 
         <p style="margin-bottom:25px; opacity:0.6; font-size: 0.9rem;">Actualiza tus datos y foto</p> 
                  
         <form method="POST" enctype="multipart/form-data"> 
             
             <label style="display:block; text-align:left; font-size:0.75rem; font-weight:800; opacity:0.5; margin-bottom:5px; text-transform:uppercase;">Correo Electrónico</label>
             <input type="email" name="email" placeholder="ejemplo@correo.com" value="{{ user.email if user.email else '' }}"> 

             <label style="display:block; text-align:left; font-size:0.75rem; font-weight:800; opacity:0.5; margin-bottom:5px; text-transform:uppercase;">Fecha de Cumpleaños</label>
             <input type="date" name="cumpleanos" value="{{ user.cumpleanos if user.cumpleanos else '' }}"> 

             <label style="display:block; text-align:left; font-size:0.75rem; font-weight:800; opacity:0.5; margin-bottom:5px; text-transform:uppercase;">Foto de Perfil</label>
             <div style="margin-bottom: 25px;">
                 <label for="input-archivo" id="label-archivo" style="display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px dashed var(--glass-border); padding: 20px; border-radius: 14px; cursor: pointer; background: rgba(255,255,255,0.01);">
                     <span style="font-weight: 700; font-size: 0.9rem; color: var(--accent);" id="texto-archivo">Subir archivo de imagen</span>
                     <span style="font-size: 0.75rem; opacity: 0.5; margin-top: 5px;">Formatos JPG, PNG o JPEG</span>
                 </label>
                 <input type="file" name="foto_perfil" id="input-archivo" accept="image/*" style="display: none;">
             </div>

             <button type="submit" class="btn-main" style="background: var(--success); color:#0f172a; border-radius:14px; padding:14px;">Guardar Cambios</button> 
             <a href="{{ url_for('perfil') }}" style="display:block; text-align:center; margin-top:20px; color:var(--text-muted); text-decoration:none; font-size:0.85rem; font-weight: 700;">← Cancelar y volver al perfil</a> 
         </form> 
     </div> 
</div> 

<script>
    const inputArchivo = document.getElementById('input-archivo');
    const labelArchivo = document.getElementById('label-archivo');
    const textoArchivo = document.getElementById('texto-archivo');

    if (inputArchivo) {
        inputArchivo.addEventListener('change', function(e) {
            if(this.files && this.files.length > 0) {
                textoArchivo.innerText = "Imagen seleccionada: " + this.files[0].name;
                labelArchivo.style.borderColor = "var(--success)";
            }
        });
    }
</script>
{% endblock %}
