<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        .card {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #ffffff;
            padding: 40px;
            border-radius: 20px;
            max-width: 500px;
            margin: 20px auto;
            text-align: center;
            border: 2px solid #fbbf24;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .icon {
            font-size: 60px;
            margin-bottom: 10px;
        }
        .title {
            color: #fbbf24;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
        }
        .user-name {
            color: #38bdf8;
            font-size: 1.2rem;
        }
        .achievement-box {
            background: rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(255,255,255,0.1);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin: 25px 0;
            padding: 20px;
        }
        .value {
            font-size: 2rem;
            font-weight: bold;
            display: block;
        }
        .footer {
            font-size: 0.8rem;
            opacity: 0.6;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🏆</div>
        <h2 class="title">¡Nuevo Logro!</h2>
        <p class="user-name">Felicidades, {{ usuario }}</p>
        
        <div class="achievement-box">
            <span style="color: #94a3b8; font-size: 0.9rem;">HAS ALCANZADO:</span>
            <span class="value">{{ tipo.upper() }} {{ valor }}</span>
        </div>

        <p style="line-height: 1.6;">
            Tu esfuerzo está dando frutos. Seguí completando tareas para convertirte en un verdadero 
            <span style="color: #38bdf8; font-weight: bold;">Maestro</span>.
        </p>

        <div class="footer">
            Enviado por el sistema de gamificación de Agenda Maestra
        </div>
    </div>
</body>
</html>
