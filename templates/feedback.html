{% extends 'layout.html' %}
{% block content %}
<div class="main-wrapper" style="display: flex; align-items: center; justify-content: center; min-height: 80vh;">
    <div class="glass-card" style="max-width: 450px; width: 90%; text-align: center; padding: 40px; border-radius: 20px; backdrop-filter: blur(15px);">
        <h2 style="color: var(--accent); letter-spacing: 2px; font-weight: 800; text-transform: uppercase;">Feedback</h2>
        <p style="font-size: 0.9rem; opacity: 0.8; margin-bottom: 30px;">Tu opinión es el motor de <strong>Agenda Maestra</strong></p>

        <form action="{{ url_for('feedback') }}" method="POST">
            <div class="input-group" style="text-align: left; margin-bottom: 25px;">
                <label style="font-size: 0.75rem; color: var(--accent); font-weight: bold; margin-left: 5px;">IDENTIDAD DEL USUARIO</label>
                <input type="text" name="nombre" required placeholder="Tu nombre o usuario..."
                       style="width: 100%; padding: 14px; background: rgba(255,255,255,0.07); border: 1px solid var(--glass-border); border-radius: 12px; color: white; outline: none; transition: 0.3s;">
            </div>

            <div class="rating-box" style="margin-bottom: 25px; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; border: 1px solid var(--glass-border);">
                <label style="font-size: 0.75rem; color: var(--accent); display: block; margin-bottom: 15px; font-weight: bold;">¿QUÉ PUNTAJE NOS DAS?</label>
                <div class="star-rating">
                    <input type="radio" name="estrella" value="5" id="s5" required><label for="s5" title="Excelente">★</label>
                    <input type="radio" name="estrella" value="4" id="s4"><label for="s4" title="Muy Bueno">★</label>
                    <input type="radio" name="estrella" value="3" id="s3"><label for="s3" title="Regular">★</label>
                    <input type="radio" name="estrella" value="2" id="s2"><label for="s2" title="Malo">★</label>
                    <input type="radio" name="estrella" value="1" id="s1"><label for="s1" title="Muy Malo">★</label>
                </div>
            </div>

            <div class="input-group" style="text-align: left; margin-bottom: 30px;">
                <label style="font-size: 0.75rem; color: var(--accent); font-weight: bold; margin-left: 5px;">SUGERENCIAS Y MEJORAS</label>
                <textarea name="sugerencia" required placeholder="Cuéntanos cómo podemos hacer la agenda más útil para ti..." 
                          style="width: 100%; height: 120px; background: rgba(255,255,255,0.07); border: 1px solid var(--glass-border); border-radius: 12px; color: white; padding: 14px; resize: none; outline: none; transition: 0.3s;"></textarea>
            </div>

            <button type="submit" class="btn-main-submit">
                ENVIAR REPORTE
            </button>
        </form>
    </div>
</div>

<style>
    .star-rating {
        display: flex;
        flex-direction: row-reverse;
        justify-content: center;
        font-size: 2.5rem;
    }
    .star-rating input { display: none; }
    .star-rating label {
        color: rgba(255,255,255,0.1);
        cursor: pointer;
        transition: transform 0.2s, color 0.2s;
        padding: 0 5px;
    }
    .star-rating label:hover { transform: scale(1.2); }
    .star-rating label:hover,
    .star-rating label:hover ~ label,
    .star-rating input:checked ~ label {
        color: #ffca08;
        text-shadow: 0 0 15px rgba(255, 202, 8, 0.6);
    }
    .input-group input:focus, .input-group textarea:focus {
        border-color: var(--accent);
        background: rgba(255,255,255,0.12);
    }
    .btn-main-submit {
        width: 100%; 
        padding: 16px; 
        border-radius: 12px; 
        background: var(--accent); 
        color: #000; 
        font-weight: 900; 
        border: none; 
        cursor: pointer; 
        transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        text-transform: uppercase;
        letter-spacing: 1px;
    }
    .btn-main-submit:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 20px rgba(var(--accent-rgb), 0.4);
        filter: brightness(1.1);
    }
</style>
{% endblock %}
