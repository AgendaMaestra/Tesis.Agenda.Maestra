<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='icono.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='estilos.css') }}">
    <title>Agenda Maestra</title>

    <style>
        /* ============================================================
   ESTILOS BASE Y VARIABLES (SISTEMA DE DISEÑO)
   ============================================================ */
:root {
    /* Modo Oscuro (Default) */
    --bg-body: #0f172a;
    --text-main: #ffffff;
    --text-clock: #38bdf8; /* Celeste para resaltar el tiempo */
    --btn-bg: rgba(255, 255, 255, 0.05);
    --btn-text: #ffffff;
    --btn-border: rgba(255, 255, 255, 0.1);
    --accent: #38bdf8;
    --glass-shadow: 0 4px 12px rgba(0, 0, 0, 0.3);
}

/* ESTILOS MODO CLARO */
body.light-mode {
    --bg-body: #f1f5f9;
    --text-main: #1e293b;
    --text-clock: #0ea5e9;
    --btn-bg: rgba(255, 255, 255, 0.8);
    --btn-text: #1e293b;
    --btn-border: #cbd5e1;
    --glass-shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
}

body {
    background-color: var(--bg-body);
    color: var(--text-main);
    margin: 0;
    padding: 0;
    /* Transición suave para todos los cambios de color */
    transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1), color 0.4s ease;
    font-family: 'Plus Jakarta Sans', 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
}

/* ============================================================
   COMPONENTES DE NAVEGACIÓN SUPERIOR
   ============================================================ */

/* Estilo común para elementos flotantes (Reloj y Toggle) */
.nav-floating-item {
    position: absolute;
    top: 20px;
    padding: 10px 16px;
    background: var(--btn-bg);
    color: var(--btn-text);
    border: 1px solid var(--btn-border);
    border-radius: 12px;
    backdrop-filter: blur(8px); /* Efecto cristal moderno */
    -webkit-backdrop-filter: blur(8px);
    box-shadow: var(--glass-shadow);
    z-index: 1000;
    transition: all 0.3s ease;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
}

.nav-floating-item:hover {
    background: rgba(56, 189, 248, 0.1);
    border-color: var(--accent);
    transform: translateY(-2px);
}

/* RELOJ DIGITAL */
.digital-clock {
    right: 20px;
    font-family: 'JetBrains Mono', monospace; /* Fuente más "tech" para el reloj */
    font-weight: 600;
    font-size: 0.95rem;
    color: var(--text-clock);
    letter-spacing: 1px;
}

/* BOTÓN DE TEMA (Toggle) */
.theme-toggle {
    left: 20px;
    font-size: 0.85rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

/* Ajuste sutil para evitar solapamiento con el título en móviles */
@media (max-width: 480px) {
    .digital-clock, .theme-toggle {
        top: 10px;
        padding: 6px 12px;
        font-size: 0.8rem;
    }
}

/* ============================================================
   AJUSTE PARA MÓVILES EN LAYOUT (Reloj y Contraste)
   ============================================================ */
@media (max-width: 640px) {
    /* Contenedor invisible para agrupar los controles superiores si no existe uno, 
       o aplicamos estilos directos para que fluyan mejor */
    
    .digital-clock {
        position: relative !important; /* Cambiado de static para permitir ligeros ajustes de top/left */
        top: 0 !important;
        right: 0 !important;
        font-size: 1.2rem !important; /* Un poco más pequeño en móvil */
        margin: 15px auto 5px auto !important;
        padding: 8px 15px !important;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 12px;
        width: fit-content !important; /* No ocupa todo el ancho, solo lo que necesita */
        border: 1px solid var(--glass-border);
    }

    .theme-toggle {
        position: relative !important;
        top: 0 !important;
        left: 0 !important;
        display: block !important;
        width: 80% !important; /* Más elegante que el 100% */
        max-width: 200px;
        margin: 10px auto !important;
        padding: 8px !important;
        font-size: 0.75rem !important;
        text-transform: uppercase;
        letter-spacing: 1px;
        border-radius: 20px !important;
    }
}

        .theme-toggle:hover {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
        }
        /* Clase maestra para el Modo Enfoque */
    body.modo-enfoque-activo .tarea-card:not(.importante),
    body.modo-enfoque-activo .filter-scroll-container > *:not(#btn-enfoque),
    body.modo-enfoque-activo div[style*="grid-template-columns: 1fr 1fr"],
    body.modo-enfoque-activo #btn-toggle-tareas,
    body.modo-enfoque-activo .sub-title {
        display: none !important;
    }

    /* Aseguramos que el botón de enfoque se vea bien siempre */
    #btn-enfoque {
        transition: all 0.3s ease;
    }
    </style>

<script>

   /**
 * Protocolo de Invocación Restringida
 * Atajo: Ctrl + Shift + H (Se recomienda añadir Shift para evitar conflictos con el historial)
 */
(function() {
    'use strict';

    const ADMIN_ENTRY_POINT = "/admin-panel-secret";

    document.addEventListener('keydown', function(event) {
        // Usamos .code en lugar de .key para ignorar el estado de Mayus/Idioma
        const isCtrl = event.ctrlKey || event.metaKey; // Soporte para Mac (Command)
        const isKeyH = event.code === 'KeyH';

        if (isCtrl && isKeyH) {
            // Prevenir acciones por defecto del navegador (como abrir historial)
            event.preventDefault();
            event.stopPropagation();

            // Feedback visual sutil antes de redireccionar (opcional)
            console.warn("Acceso de sistema detectado. Redirigiendo a terminal...");
            
            // Pequeño retraso para asegurar que el preventDefault se procese
            setTimeout(() => {
                window.location.href = ADMIN_ENTRY_POINT;
            }, 100);
        }
    });
})();
    /**
     * Gestión de Temas (Modo Claro/Oscuro)
     * Optimizamos para evitar el parpadeo de carga
     */
    const toggleTheme = () => {
        const isLight = document.body.classList.toggle("light-mode");
        localStorage.setItem("theme", isLight ? "light" : "dark");
    };

    /**
     * Reloj Digital
     * Usamos Intl.DateTimeFormat para mayor precisión y soporte de formatos
     */
    const updateClock = () => {
        const clockElement = document.getElementById('clock');
        if (!clockElement) return;

        const now = new Date();
        // Formateador robusto: HH:MM:SS
        const timeString = now.toLocaleTimeString('es-AR', {
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit',
            hour12: false
        });
        
        clockElement.textContent = timeString;
    };

    /**
     * Inicialización Inmediata
     * Ejecutamos la carga del tema antes del renderizado para evitar el "flash"
     */
    (function init() {
        // 1. Aplicar tema inmediatamente (prevenir parpadeo)
        const savedTheme = localStorage.getItem("theme");
        if (savedTheme === "light") {
            document.documentElement.classList.add("light-mode"); // Aplicar a html o body
            document.addEventListener('DOMContentLoaded', () => document.body.classList.add("light-mode"));
        }

        // 2. Configurar eventos al cargar el DOM
        document.addEventListener('DOMContentLoaded', () => {
            updateClock();
            setInterval(updateClock, 1000);
        });
    })();
</script>
</head>
<body>
    <header class="top-bar">
        <div class="nav-container">
            <button class="theme-toggle nav-floating-item" onclick="toggleTheme()" aria-label="Cambiar modo de contraste">
                <span class="icon"></span>
                <span class="text-toggle">Contraste</span>
            </button>

            <div id="clock" class="digital-clock nav-floating-item" aria-live="off">
                00:00:00
            </div>
        </div>
    </header>

    <main id="main-content" role="main">
        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='js/assistant.js') }}"></script>
</body>
</html>
