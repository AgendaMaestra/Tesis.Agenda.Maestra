{% extends 'layout.html' %} 
{% block content %} 
<div class="main-wrapper"> 
     <div class="glass-card" style="text-align: center;"> 
         <h1 style="font-weight:800; margin-bottom:10px;">NUEVA CUENTA</h1> 
         <p style="margin-bottom:30px; opacity:0.6; font-size: 0.95rem;">Únete a la agenda estudiantil</p> 
                  
         <form method="POST" enctype="multipart/form-data"> 
             <label style="display:block; text-align:left; font-size:0.75rem; font-weight:800; opacity:0.5; margin-bottom:5px;">USUARIO</label>
             <input type="text" name="usuario" placeholder="Elige un nombre de usuario" required> 
             
             <label style="display:block; text-align:left; font-size:0.75rem; font-weight:800; opacity:0.5; margin-bottom:5px;">CONTRASEÑA</label>
             <input type="password" name="password" placeholder="Crea una contraseña segura" required> 

             <label style="display:block; text-align:left; font-size:0.75rem; font-weight:800; opacity:0.5; margin-bottom:5px;">CORREO ELECTRÓNICO</label>
             <input type="email" name="email" placeholder="ejemplo@correo.com" style="width: 100%; background: rgba(255, 255, 255, 0.04); border: 1px solid var(--glass-border); padding: 16px; border-radius: 16px; color: var(--text); font-size: 1rem; margin-bottom: 20px; outline: none;" required> 

             <label style="display:block; text-align:left; font-size:0.75rem; font-weight:800; opacity:0.5; margin-bottom:5px;">FECHA DE CUMPLEAÑOS</label>
             <input type="date" name="cumpleanos" required> 

             <label style="display:block; text-align:left; font-size:0.75rem; font-weight:800; opacity:0.5; margin-bottom:5px;">FOTO DE PERFIL</label>
             
             <div style="margin-bottom: 25px;">
                 <label for="input-archivo" style="display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 25px; border: 2px dashed var(--glass-border); border-radius: 18px; background: rgba(255, 255, 255, 0.02); cursor: pointer; transition: all 0.3s;" id="label-archivo">
                     <span style="font-size: 1.5rem; margin-bottom: 8px;">🖼️</span>
                     <span style="font-weight: 700; font-size: 0.9rem; color: var(--accent);" id="texto-archivo">Subir desde la computadora</span>
                     <span style="font-size: 0.75rem; opacity: 0.5; margin-top: 4px;">Archivos .jpg, .png o .jpeg</span>
                 </label>
                 <input type="file" name="foto_perfil" id="input-archivo" accept="image/*" style="display: none;">
             </div>

             <button type="submit" class="btn-main" style="margin-top: 10px; background: var(--success); color:#fff;">CREAR MI CUENTA</button> 
         </form> 
                  
         <p style="margin-top:30px; font-size: 0.9rem; opacity: 0.7;"> 
             ¿Ya eres miembro? <a href="{{ url_for('login') }}" style="color:var(--accent); text-decoration:none; font-weight:800;">Inicia sesión</a> 
         </p> 
     </div> 
</div> 

<script>
    const inputArchivo = document.getElementById('input-archivo');
    const labelArchivo = document.getElementById('label-archivo');
    const textoArchivo = document.getElementById('texto-archivo');

    inputArchivo.addEventListener('change', function(e) {
        if(this.files && this.files.length > 0) {
            textoArchivo.innerText = "Seleccionado: " + this.files[0].name;
            labelArchivo.style.borderColor = "var(--accent)";
            labelArchivo.style.background = "rgba(56, 189, 248, 0.05)";
        }
    });
</script>
{% endblock %}
